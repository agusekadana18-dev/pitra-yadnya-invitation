<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upacara Pitra Yadnya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --bg:#0b0b0b;
  --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
}

/* ===== COVER ===== */
#cover{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,#000,#111);
}

.cover-photo{
  width:220px;
  height:220px;
  border-radius:50%;
  overflow:hidden;
  border:3px solid var(--gold);
  margin-bottom:30px;
}
.cover-photo img{
  width:100%;
  height:100%;
  object-fit:cover;
}

#cover h1{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  margin-bottom:20px;
}

#openBtn{
  padding:14px 42px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}
#openBtn:hover{
  background:var(--gold);
  color:#000;
}

/* ===== MAIN ===== */
#main{
  display:none;
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}

.ornament{
  width:220px;
  margin:30px auto;
}

.hero{
  width:100%;
  max-width:420px;
  border:3px solid var(--gold);
  margin:30px auto;
}

h2{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  margin:20px 0;
}

/* Countdown */
#countdown{
  display:flex;
  justify-content:center;
  gap:16px;
  margin:30px 0;
  flex-wrap:wrap;
}
.cd-box{
  border:1px solid var(--gold);
  padding:12px 18px;
  min-width:80px;
}
.cd-box span{
  display:block;
  font-size:22px;
  color:var(--gold);
}

/* Maps */
iframe{
  width:100%;
  height:320px;
  border:0;
  margin-top:20px;
}

/* Music */
#musicBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:var(--gold);
  color:#000;
  border:none;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- COVER -->
<section id="cover">
  <div class="cover-photo">
    <img src="assets/cover.jpg" alt="Cover">
  </div>
  <h1>Upacara Pitra Yadnya</h1>
  <button id="openBtn">Buka Undangan</button>
</section>

<!-- MAIN -->
<section id="main">

  <!-- Ornament Bali -->
  <svg class="ornament" viewBox="0 0 200 40">
    <path d="M10 20 Q100 -30 190 20 Q100 70 10 20Z" fill="none" stroke="#d4af37" stroke-width="2"/>
  </svg>

  <p>Om Swastyastu</p>
  <h2 id="personName">—</h2>
  <p id="eventDate">—</p>

  <img id="heroImage" class="hero" src="" alt="Foto Upacara">

  <!-- COUNTDOWN -->
  <div id="countdown">
    <div class="cd-box"><span id="d">0</span>Hari</div>
    <div class="cd-box"><span id="h">0</span>Jam</div>
    <div class="cd-box"><span id="m">0</span>Menit</div>
    <div class="cd-box"><span id="s">0</span>Detik</div>
  </div>

  <h2>Lokasi Upacara</h2>
  <iframe id="maps" loading="lazy"></iframe>

</section>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="assets/musik.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn" style="display:none;">♫</button>

<script>
const cover = document.getElementById('cover');
const main = document.getElementById('main');
const openBtn = document.getElementById('openBtn');
const music = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

openBtn.onclick = ()=>{
  cover.style.display='none';
  main.style.display='block';
  music.play().catch(()=>{});
  musicBtn.style.display='block';
};

musicBtn.onclick = ()=>{
  music.paused ? music.play() : music.pause();
};

// LOAD DATA
fetch('event.json')
.then(res=>res.json())
.then(data=>{
  document.getElementById('personName').innerText = data.person;
  document.getElementById('eventDate').innerText = data.dateText;
  document.getElementById('heroImage').src = data.hero;
  document.getElementById('maps').src = data.maps;

  const target = new Date(data.dateISO).getTime();
  setInterval(()=>{
    const now = new Date().getTime();
    const diff = target - now;
    if(diff <= 0) return;

    document.getElementById('d').innerText = Math.floor(diff/86400000);
    document.getElementById('h').innerText = Math.floor(diff/3600000)%24;
    document.getElementById('m').innerText = Math.floor(diff/60000)%60;
    document.getElementById('s').innerText = Math.floor(diff/1000)%60;
  },1000);
})
.catch(err=>{
  console.error("event.json error:", err);
});
</script>

</body>
</html>
