<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitra Yadnya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css">

<style>
:root{
  --black:#05080d;
  --gold:#c9a24d;
  --gold-soft:#e7d9a6;
  --text:#f5f5f5;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:"Playfair Display", serif;
  background:radial-gradient(circle at top,#0b1220,#05080d);
  color:var(--text);
  overflow-x:hidden;
}

section{
  padding:90px 20px;
  text-align:center;
}

h1,h2{
  color:var(--gold);
  letter-spacing:2px;
}

p{
  max-width:760px;
  margin:auto;
  line-height:1.9;
  font-size:17px;
}

.divider{
  width:120px;
  height:2px;
  background:linear-gradient(to right,transparent,var(--gold),transparent);
  margin:30px auto;
}

/* COVER */
#cover{
  position:fixed;
  inset:0;
  background:#02040a;
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.envelope{
  border:1px solid var(--gold);
  padding:50px 40px;
  max-width:380px;
}
.envelope .seal{
  font-size:20px;
  color:var(--gold-soft);
}
#openInvitation{
  margin-top:25px;
  padding:14px 36px;
  background:var(--gold);
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  gap:20px;
}
.hero img{
  width:160px;
  opacity:.9;
}
.hero h1{font-size:44px}
.hero h2{
  font-size:22px;
  font-weight:400;
  color:var(--gold-soft);
}
#guestName{
  margin-top:20px;
  font-size:16px;
  opacity:.9;
}

/* COUNTDOWN */
#countdown{
  display:flex;
  justify-content:center;
  gap:18px;
  margin-top:40px;
}
#countdown div{
  border:1px solid var(--gold);
  padding:18px;
  min-width:80px;
}

/* MAP */
iframe{
  width:100%;
  max-width:820px;
  height:360px;
  border:0;
}

/* RSVP */
form{
  max-width:420px;
  margin:40px auto 0;
  display:grid;
  gap:16px;
}
input,select,textarea{
  padding:12px;
  background:#0d1422;
  color:white;
  border:1px solid var(--gold);
}
button{
  padding:14px;
  background:var(--gold);
  border:none;
  font-weight:bold;
  cursor:pointer;
}

/* MUSIC BTN */
#musicToggle{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--gold);
  border:none;
  padding:14px;
  border-radius:50%;
  cursor:pointer;
  z-index:50;
}

/* FOOTER */
footer{
  padding:40px 20px;
  font-size:14px;
  color:#bbb;
}

/* PARTICLES */
#particles-js{
  position:fixed;
  inset:0;
  z-index:-1;
}
</style>
</head>

<body>

<div id="particles-js"></div>

<!-- COVER -->
<section id="cover">
  <div class="envelope">
    <div class="seal">Om Swastyastu</div>
    <div class="divider"></div>
    <div id="coverTitle"></div>
    <button id="openInvitation">Buka Undangan</button>
  </div>
</section>

<!-- MUSIC -->
<audio id="bgMusic" preload="auto"></audio>
<button id="musicToggle">⏸</button>

<!-- HERO -->
<section class="hero" data-aos="fade-up">
  <img id="logo">
  <h1 id="eventTitle"></h1>
  <h2 id="eventSubtitle"></h2>
  <div id="guestName"></div>
</section>

<!-- MANTRA -->
<section data-aos="fade-up">
  <div class="divider"></div>
  <p id="mantra"></p>
</section>

<!-- COUNTDOWN -->
<section data-aos="fade-up">
  <h2 id="countdownLabel"></h2>
  <div id="countdown">
    <div><span id="days"></span><br>Hari</div>
    <div><span id="hours"></span><br>Jam</div>
    <div><span id="minutes"></span><br>Menit</div>
    <div><span id="seconds"></span><br>Detik</div>
  </div>
</section>

<!-- LOCATION -->
<section data-aos="fade-up">
  <h2>Lokasi Upacara</h2>
  <div class="divider"></div>
  <p id="locationText"></p>
  <iframe id="map"></iframe>
</section>

<!-- RSVP -->
<section id="rsvpSection" data-aos="fade-up">
  <h2 id="rsvpTitle"></h2>
  <div class="divider"></div>
  <form id="rsvpForm">
    <input name="nama" placeholder="Nama" required>
    <select name="kehadiran">
      <option>Hadir</option>
      <option>Tidak Hadir</option>
    </select>
    <textarea name="ucapan" placeholder="Ucapan"></textarea>
    <button>Kirim RSVP</button>
  </form>
</section>

<!-- FOOTER -->
<footer>
  <p id="closing"></p>
  <p id="footer"></p>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
AOS.init();
const music=document.getElementById("bgMusic");

/* LOAD JSON */
fetch("event.json").then(r=>r.json()).then(d=>{
  coverTitle.innerText=d.cover.title;
  eventTitle.innerText=d.event.title;
  eventSubtitle.innerText=d.event.subtitle;
  mantra.innerText=d.event.mantra;
  logo.src=d.design.logo;
  music.src=d.music.audioUrl;
  music.loop=d.music.loop;
  music.volume=d.music.volume;

  locationText.innerText=d.location.place+" – "+d.location.address;
  map.src=d.location.mapsUrl.replace("maps.app.goo.gl","www.google.com/maps/embed?pb=");

  rsvpTitle.innerText=d.rsvp.title;
  closing.innerText=d.family.closingMessage;
  footer.innerText="© "+d.footer.year+" "+d.footer.credit;

  const p=new URLSearchParams(location.search);
  if(p.get("to")) guestName.innerText="Kepada Yth: "+p.get("to");

  const target=new Date(d.datetime.date+"T"+d.datetime.startTime+":00");
  setInterval(()=>{
    const diff=target-new Date();
    days.innerText=Math.floor(diff/86400000);
    hours.innerText=Math.floor(diff/3600000)%24;
    minutes.innerText=Math.floor(diff/60000)%60;
    seconds.innerText=Math.floor(diff/1000)%60;
  },1000);
});

/* OPEN */
openInvitation.onclick=()=>{
  gsap.to("#cover",{opacity:0,duration:1.6,onComplete:()=>cover.remove()});
  music.play().catch(()=>{});
}

/* MUSIC TOGGLE */
musicToggle.onclick=()=>{
  if(music.paused){music.play();musicToggle.innerText="⏸";}
  else{music.pause();musicToggle.innerText="▶";}
}

/* PARTICLES */
particlesJS("particles-js",{
  particles:{number:{value:60},color:{value:"#c9a24d"},move:{speed:0.6},size:{value:2}}
});
</script>

</body>
</html>
