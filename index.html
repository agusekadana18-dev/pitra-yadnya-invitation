<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upacara Pitra Yadnya</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --black:#0b0b0b;
}

*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Poppins',sans-serif;
  background:var(--black);
  color:#fff;
  overflow-x:hidden;
}

/* ===== COVER ===== */
#cover{
  position:fixed;
  inset:0;
  background:linear-gradient(180deg,#000,#111);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:10;
  text-align:center;
  transition:1s;
}

.envelope{
  width:260px;
  height:170px;
  border:2px solid var(--gold);
  position:relative;
  margin-bottom:40px;
  animation:float 3s ease-in-out infinite;
}
.envelope:before{
  content:'';
  position:absolute;
  inset:10px;
  border:1px solid rgba(212,175,55,.5);
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-12px)}
}

#cover h1{
  font-family:'Playfair Display',serif;
  font-weight:600;
  letter-spacing:2px;
  color:var(--gold);
  margin-bottom:20px;
}

#openBtn{
  padding:14px 42px;
  background:linear-gradient(135deg,#f5e7a1,#c9a23f);
  color:#000;
  border:none;
  font-size:16px;
  letter-spacing:2px;
  cursor:pointer;
  transition:.4s;
}
#openBtn:hover{transform:scale(1.05)}

/* ===== MAIN ===== */
main{opacity:0;transition:1s}

/* ===== ORNAMEN ===== */
.ornament{
  width:100%;
  height:90px;
  background:url("data:image/svg+xml;utf8,
  <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 1440 120'>
  <path fill='%23d4af37' fill-opacity='0.15'
  d='M0,64L80,69.3C160,75,320,85,480,74.7C640,64,800,32,960,21.3C1120,11,1280,21,1360,26.7L1440,32L1440,0L1360,0L1280,0L1120,0L960,0L800,0L640,0L480,0L320,0L160,0L80,0L0,0Z'/>
  </svg>") no-repeat center;
}

/* ===== SECTION ===== */
section{padding:70px 20px;text-align:center}
.title{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  letter-spacing:3px;
  margin-bottom:20px;
}

.photo{
  max-width:360px;
  margin:30px auto;
  border:2px solid var(--gold);
  padding:8px;
}
.photo img{width:100%;display:block}

iframe{
  width:100%;
  max-width:380px;
  height:300px;
  border:0;
  margin-top:20px;
}

/* ===== MUSIC BTN ===== */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:52px;
  height:52px;
  border-radius:50%;
  background:var(--gold);
  color:#000;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  cursor:pointer;
  display:none;
}
.spin{animation:spin 4s linear infinite}
@keyframes spin{from{transform:rotate(0)}to{transform:rotate(360deg)}}
</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
  <div class="envelope"></div>
  <h1>Upacara Pitra Yadnya</h1>
  <button id="openBtn">BUKA UNDANGAN</button>
</div>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="musik.mp3" type="audio/mpeg">
</audio>

<div id="musicBtn">♫</div>

<main id="content">

<div class="ornament"></div>

<section>
  <h2 class="title">Om Swastyastu</h2>
  <p>
    Dengan hormat kami mengundang Bapak/Ibu/Saudara/i  
    untuk menghadiri Upacara Pitra Yadnya
  </p>

  <div class="photo">
    <img src="hero.jpg" alt="Pitra Yadnya">
  </div>

  <p>
    <strong>I Gusti Agung Ngurah Sidhemen</strong><br>
    Sukra, 26 Juni 2026
  </p>

  <iframe 
    src="https://www.google.com/maps?q=Bali&output=embed">
  </iframe>
</section>

</main>

<script>
const openBtn=document.getElementById('openBtn');
const cover=document.getElementById('cover');
const content=document.getElementById('content');
const music=document.getElementById('music');
const musicBtn=document.getElementById('musicBtn');

openBtn.onclick=()=>{
  cover.style.opacity='0';
  setTimeout(()=>cover.style.display='none',1000);
  content.style.opacity='1';

  music.play().catch(()=>{});
  musicBtn.style.display='flex';
  musicBtn.classList.add('spin');
}

musicBtn.onclick=()=>{
  if(music.paused){
    music.play();
    musicBtn.classList.add('spin');
  }else{
    music.pause();
    musicBtn.classList.remove('spin');
  }
}
</script>

</body>
</html>
