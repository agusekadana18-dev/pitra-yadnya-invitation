<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upacara Pitra Yadnya</title>

<style>
/* ================= RESET ================= */
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Georgia',serif;
  background:#000;
  color:#e9d8a6;
  overflow-x:hidden;
}

/* ================= GOLD ================= */
:root{
  --gold:#d4af37;
  --gold-soft:#fff1a8;
}

/* ================= COVER ================= */
.cover{
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;
}

.envelope{
  width:320px;
  height:220px;
  position:relative;
  cursor:pointer;
  animation:float 3s ease-in-out infinite;
}

.envelope .body{
  width:100%;
  height:100%;
  background:#111;
  border:2px solid var(--gold);
  border-radius:6px;
  position:absolute;
  z-index:1;
}

.envelope .flap{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#111;
  border:2px solid var(--gold);
  clip-path:polygon(0 0,100% 0,50% 55%);
  transform-origin:top;
  transition:transform 1.2s ease;
  z-index:2;
}

.envelope.open .flap{
  transform:rotateX(180deg);
}

.envelope .seal{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  width:40px;
  height:40px;
  border-radius:50%;
  background:radial-gradient(circle,var(--gold-soft),var(--gold));
  box-shadow:0 0 15px rgba(212,175,55,.8);
  z-index:3;
}

@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}

/* ================= CONTENT ================= */
.content{
  display:none;
  padding:100px 20px;
  text-align:center;
  position:relative;
}

.content.show{display:block}

/* ================= ORNAMEN ================= */
.ornamen{
  position:absolute;
  width:100%;
  left:0;
  z-index:0;
  opacity:0;
  animation:ornamenIn 2s forwards;
}
.ornamen svg{width:100%}
.ornamen path{
  fill:none;
  stroke:var(--gold);
  stroke-width:2.5;
  filter:drop-shadow(0 0 6px rgba(212,175,55,.6));
}
.ornamen.top{top:0}
.ornamen.bottom{bottom:0}
@keyframes ornamenIn{
  from{opacity:0;transform:translateY(-20px)}
  to{opacity:1;transform:none}
}

/* ================= FOTO ================= */
.photo{
  width:220px;
  height:220px;
  border-radius:50%;
  border:4px solid var(--gold);
  margin:0 auto 30px;
  background:url('assets/foto.jpg') center/cover;
  box-shadow:0 0 25px rgba(212,175,55,.7);
}

/* ================= MUSIC ================= */
.music-btn{
  position:fixed;
  top:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:radial-gradient(circle,var(--gold-soft),var(--gold));
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:22px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(212,175,55,.8);
  animation:spin 6s linear infinite;
  z-index:999;
}
.music-btn.paused{animation:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ================= MAP ================= */
.map{
  margin-top:50px;
  border:2px solid var(--gold);
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 0 20px rgba(212,175,55,.5);
}

/* ================= MOBILE ================= */
@media(max-width:480px){
  .envelope{width:260px;height:180px}
  .photo{width:180px;height:180px}
}
</style>
</head>

<body>

<!-- MUSIC -->
<audio id="music" loop>
  <source src="assets/musik.mp3" type="audio/mpeg">
</audio>
<div class="music-btn paused" id="musicBtn">♫</div>

<!-- COVER -->
<div class="cover">
  <div class="envelope" id="envelope">
    <div class="flap"></div>
    <div class="body"></div>
    <div class="seal"></div>
  </div>
</div>

<!-- CONTENT -->
<div class="content" id="content">

  <!-- ORNAMEN -->
  <div class="ornamen top">
    <svg viewBox="0 0 800 200">
      <path d="M400 10 C520 80 680 0 760 60" />
    </svg>
  </div>

  <div class="ornamen bottom">
    <svg viewBox="0 0 800 200">
      <path d="M400 190 C520 120 680 200 760 140" />
    </svg>
  </div>

  <div class="photo"></div>

  <h1>I Gusti Agung Ngurah Sidhemen</h1>
  <p>Upacara Pitra Yadnya</p>
  <p>Sukra, 26 Juni 2026</p>

  <!-- MAP -->
  <div class="map">
    <iframe
      src="https://www.google.com/maps?q=Bali&output=embed"
      width="100%" height="300" style="border:0" loading="lazy">
    </iframe>
  </div>

</div>

<script>
const envelope=document.getElementById('envelope');
const content=document.getElementById('content');
const music=document.getElementById('music');
const musicBtn=document.getElementById('musicBtn');

envelope.onclick=()=>{
  envelope.classList.add('open');
  setTimeout(()=>{
    document.querySelector('.cover').style.display='none';
    content.classList.add('show');
    music.play();
    musicBtn.classList.remove('paused');
  },1200);
};

musicBtn.onclick=()=>{
  if(music.paused){
    music.play();
    musicBtn.classList.remove('paused');
  }else{
    music.pause();
    musicBtn.classList.add('paused');
  }
};
</script>

</body>
</html>
