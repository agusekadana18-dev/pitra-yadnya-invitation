<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upacara Pitra Yadnya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --bg:#0b0b0b;
  --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
  text-align:center;
  line-height:1.7;
}

/* ===== COVER ===== */
#cover{
  position:relative;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  overflow:hidden;
  background:linear-gradient(180deg,#000,#111);
}

.cover-box{
  max-width:500px;
  padding:20px;
  z-index:2;
}

.cover-box h4{letter-spacing:2px;}
.cover-box h1{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  font-size:38px;
}

#openBtn{
  margin-top:30px;
  padding:14px 44px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
}
#openBtn:hover{
  background:var(--gold);
  color:#000;
}

/* floating ornament */
.floating-ornament{
  position:absolute;
  width:100%;
  height:100%;
  top:0;
  left:0;
  pointer-events:none;
}

.floating-ornament span{
  position:absolute;
  color:rgba(212,175,55,0.15);
  font-size:20px;
  animation:float 10s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh);opacity:0;}
  50%{opacity:1;}
  100%{transform:translateY(-10vh);opacity:0;}
}

/* ===== MAIN ===== */
#main{
  display:none;
  max-width:1000px;
  margin:auto;
  padding:60px 20px;
}

.section{margin:70px 0;}

.ornament{
  font-size:28px;
  color:var(--gold);
}

/* HERO */
.hero-wrap{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  text-align:left;
}

.hero-img img{
  width:100%;
  border:2px solid var(--gold);
}

.hero-text h2{
  color:var(--gold);
  font-family:'Playfair Display',serif;
}

/* COUNTDOWN */
#countdown{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.cd-box{
  border:1px solid var(--gold);
  padding:12px 16px;
  min-width:80px;
}

.cd-box span{
  font-size:22px;
  color:var(--gold);
}

/* MUSIC */
#musicBtn{
  position:fixed;
  right:20px;
  bottom:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--gold);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- COVER -->
<section id="cover">
  <div class="floating-ornament">
    <span style="left:10%">ᬒᬫ᭄</span>
    <span style="left:30%">✦</span>
    <span style="left:60%">ᬒᬫ᭄</span>
    <span style="left:80%">✦</span>
  </div>

  <div class="cover-box">
    <h4>Upacara</h4>
    <h1>Pitra Yadnya</h1>
    <p><b>I Gusti Agung Ngurah Sidhemen</b></p>
    <p>Sukra, 26 Juni 2026</p>

    <button id="openBtn">Buka Undangan</button>
  </div>
</section>

<!-- MAIN -->
<section id="main">

  <div class="section">
    <div class="ornament">ᬒᬫ᭄</div>
    <p>Om Swastyastu</p>
    <p>Undangan Upacara Pitra Yadnya</p>
  </div>

  <div class="section hero-wrap">
    <div class="hero-img">
      <img src="assets/hero.jpg">
    </div>
    <div class="hero-text">
      <h2>I Gusti Agung Ngurah Sidhemen</h2>
      <p>In Loving Memory</p>
    </div>
  </div>

  <div class="section">
    <h2>Countdown</h2>
    <div id="countdown">
      <div class="cd-box"><span id="d">0</span>Hari</div>
      <div class="cd-box"><span id="h">0</span>Jam</div>
      <div class="cd-box"><span id="m">0</span>Menit</div>
      <div class="cd-box"><span id="s">0</span>Detik</div>
    </div>
  </div>

</section>

<audio id="bgMusic" loop></audio>
<button id="musicBtn" style="display:none;">♫</button>

<script>
const cover=document.getElementById('cover');
const main=document.getElementById('main');
const openBtn=document.getElementById('openBtn');
const musicBtn=document.getElementById('musicBtn');
const music=document.getElementById('bgMusic');

let target;

fetch('event.json')
.then(r=>r.json())
.then(d=>{

  target=new Date(d.event.dateISO).getTime();

  setInterval(()=>{
    let diff=target-Date.now();
    if(diff<=0)return;

    d1=Math.floor(diff/86400000);
    h1=Math.floor(diff/3600000)%24;
    m1=Math.floor(diff/60000)%60;
    s1=Math.floor(diff/1000)%60;

    d.innerText=d1;
    h.innerText=h1;
    m.innerText=m1;
    s.innerText=s1;
  },1000);

  music.src=d.music.audio;
});

openBtn.onclick=()=>{
  cover.style.display='none';
  main.style.display='block';
  musicBtn.style.display='block';
  music.play().catch(()=>{});
};

musicBtn.onclick=()=>{
  music.paused?music.play():music.pause();
};
</script>

</body>
</html>
