<script>
fetch('event.json')
  .then(res => {
    if (!res.ok) throw new Error('event.json tidak terbaca');
    return res.json();
  })
  .then(data => {

    /* OPENING / COVER */
    document.querySelector('#cover h1').innerText = data.opening.title;
    document.querySelector('#openBtn').innerText = data.opening.buttonText;
    document.querySelector('.cover-photo img').src = data.opening.coverImage;

    /* EVENT */
    document.getElementById('personName').innerText = data.event.person;
    document.getElementById('eventDate').innerText =
      data.event.dateText + ' | ' + data.event.timeText;

    /* HERO */
    document.getElementById('heroImage').src = data.hero.image;

    /* MAPS */
    document.getElementById('maps').src = data.location.mapsEmbed;

    /* COUNTDOWN */
    if (data.countdown.enable) {
      const target = new Date(data.event.dateISO).getTime();
      setInterval(() => {
        const now = new Date().getTime();
        const diff = target - now;
        if (diff <= 0) return;

        document.getElementById('d').innerText = Math.floor(diff / (1000 * 60 * 60 * 24));
        document.getElementById('h').innerText = Math.floor(diff / (1000 * 60 * 60) % 24);
        document.getElementById('m').innerText = Math.floor(diff / (1000 * 60) % 60);
        document.getElementById('s').innerText = Math.floor(diff / 1000 % 60);
      }, 1000);
    }

    /* MUSIC */
    const music = document.getElementById('bgMusic');
    if (data.music.enable) {
      music.src = data.music.audio;
      music.loop = data.music.loop;
    }

  })
  .catch(err => {
    console.error('ERROR:', err);
    alert('Data undangan gagal dimuat. Cek event.json');
  });

/* OPEN BUTTON */
const openBtn = document.getElementById('openBtn');
const cover = document.getElementById('cover');
const main = document.getElementById('main');
const music = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

openBtn.onclick = () => {
  cover.style.display = 'none';
  main.style.display = 'block';
  musicBtn.style.display = 'block';
};

/* MUSIC TOGGLE */
musicBtn.onclick = () => {
  music.paused ? music.play() : music.pause();
};
</script>
