<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Upacara Pitra Yadnya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --bg:#0b0b0b;
  --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
  background:var(--bg);
  color:var(--text);
  font-family:Poppins,sans-serif;
  text-align:center;
}

/* COVER */
#cover{
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  background:linear-gradient(180deg,#000,#111);
}
#cover h1{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  font-size:32px;
  margin-bottom:30px;
}
#openBtn{
  padding:14px 40px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  font-size:16px;
  cursor:pointer;
  transition:.3s;
}
#openBtn:hover{
  background:var(--gold);
  color:#000;
}

/* ORNAMENT */
.ornament{
  width:160px;
  margin:20px auto;
}

/* MAIN */
#main{
  display:none;
  padding:60px 20px;
  max-width:900px;
  margin:auto;
}
.hero{
  max-width:100%;
  border:3px solid var(--gold);
  margin:30px 0;
}
h2{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  margin:20px 0;
}

/* MUSIC BUTTON */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  background:var(--gold);
  color:#000;
  border:none;
  border-radius:50%;
  width:50px;
  height:50px;
  font-size:18px;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- COVER -->
<section id="cover">
  <h1>Upacara Pitra Yadnya</h1>
  <button id="openBtn">Buka Undangan</button>
</section>

<!-- MAIN -->
<section id="main">

  <!-- ORNAMENT SVG -->
  <svg class="ornament" viewBox="0 0 200 40">
    <path d="M10 20 Q100 -20 190 20 Q100 60 10 20Z" fill="none" stroke="#d4af37" stroke-width="2"/>
  </svg>

  <p>Om Swastyastu</p>
  <h2 id="personName"></h2>
  <p id="eventDate"></p>

  <img id="heroImage" class="hero" src="" alt="Foto Upacara">

</section>

<!-- MUSIC -->
<audio id="bgMusic" loop>
  <source src="assets/musik.mp3" type="audio/mpeg">
</audio>
<button id="musicBtn" style="display:none;">♫</button>

<script>
fetch('event.json')
.then(r=>r.json())
.then(data=>{
  document.getElementById('personName').innerText = data.invitation.personName;
  document.getElementById('eventDate').innerText =
    data.invitation.date.day + ', ' + data.invitation.date.fullDate;
  document.getElementById('heroImage').src = data.media.photo.file;
});

const openBtn = document.getElementById('openBtn');
const cover = document.getElementById('cover');
const main = document.getElementById('main');
const music = document.getElementById('bgMusic');
const musicBtn = document.getElementById('musicBtn');

openBtn.onclick = ()=>{
  cover.style.display='none';
  main.style.display='block';
  music.play();
  musicBtn.style.display='block';
};

musicBtn.onclick = ()=>{
  if(music.paused){music.play();musicBtn.innerText='♫'}
  else{music.pause();musicBtn.innerText='⏸'}
};
</script>

</body>
</html>
