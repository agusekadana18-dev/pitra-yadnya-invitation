<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitra Yadnya</title>

<style>
:root{
  --black:#071320;
  --gold:#D4AF37;
  --gold-light:#F4E7A1;
  --white:#ffffff;
}
*{box-sizing:border-box;margin:0;padding:0;font-family:Georgia,serif;}
body{
  background:var(--black);
  color:var(--white);
  text-align:center;
  overflow-x:hidden;
}
section{padding:60px 20px;}
h1{font-size:42px;color:var(--gold);}
h2{font-size:26px;color:var(--gold-light);margin-top:10px;}
p{max-width:700px;margin:20px auto;line-height:1.8}

/* COVER */
#cover{
  position:fixed;
  inset:0;
  background:radial-gradient(circle,var(--black),#000);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:999;
}
.envelope{
  width:320px;
  padding:40px 20px;
  border:2px solid var(--gold);
  background:#000;
  animation:float 3s ease-in-out infinite;
}
@keyframes float{
  0%,100%{transform:translateY(0)}
  50%{transform:translateY(-10px)}
}
#openBtn{
  margin-top:30px;
  padding:12px 30px;
  border:none;
  background:linear-gradient(135deg,var(--gold),var(--gold-light));
  color:#000;
  font-size:16px;
  cursor:pointer;
}

/* ORNAMEN */
.ornament{
  width:120px;
  margin:30px auto;
}
svg path{fill:var(--gold);}

/* HERO */
#hero img{
  width:100%;
  max-width:420px;
  border:4px solid var(--gold);
  margin-top:30px;
}

/* COUNTDOWN */
#countdown{
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:30px;
}
.time-box{
  border:1px solid var(--gold);
  padding:15px;
  min-width:70px;
}
.time-box span{
  display:block;
  font-size:26px;
  color:var(--gold);
}
footer{
  padding:40px;
  font-size:14px;
  color:#aaa;
}
</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
  <div class="envelope">
    <h2 id="coverGreeting">Om Swastyastu</h2>
    <div class="ornament">
      <svg viewBox="0 0 100 40">
        <path d="M10 20 Q50 -10 90 20 Q50 50 10 20Z"/>
      </svg>
    </div>
    <button id="openBtn">Buka Undangan</button>
  </div>
</div>

<audio id="bgMusic" loop></audio>

<!-- HERO -->
<section id="hero">
  <h1 id="eventTitle"></h1>
  <h2 id="eventSubtitle"></h2>
  <img id="heroImage">
</section>

<section>
  <p id="mantra"></p>

  <div id="countdown">
    <div class="time-box"><span id="d">0</span>Hari</div>
    <div class="time-box"><span id="h">0</span>Jam</div>
    <div class="time-box"><span id="m">0</span>Menit</div>
    <div class="time-box"><span id="s">0</span>Detik</div>
  </div>
</section>

<section>
  <h2 id="locationName"></h2>
  <p id="locationAddress"></p>
  <a id="mapsLink" target="_blank" style="color:var(--gold)">Lihat di Google Maps</a>
</section>

<section>
  <p id="closingText"></p>
</section>

<footer id="footer"></footer>

<script>
fetch("event.json")
.then(r=>r.json())
.then(d=>{
  eventTitle.innerText=d.eventTitle;
  eventSubtitle.innerText=d.eventSubtitle;
  mantra.innerText=d.mantra;
  heroImage.src=d.heroImage;
  locationName.innerText=d.locationName;
  locationAddress.innerText=d.locationAddress;
  mapsLink.href=d.mapsUrl;
  closingText.innerText=d.closingText;
  footer.innerText=d.footer;
  bgMusic.src=d.musicSrc;

  const target=new Date(d.eventDate).getTime();
  setInterval(()=>{
    const now=Date.now();
    const diff=target-now;
    d.innerText=Math.floor(diff/86400000);
    h.innerText=Math.floor(diff%86400000/3600000);
    m.innerText=Math.floor(diff%3600000/60000);
    s.innerText=Math.floor(diff%60000/1000);
  },1000);
});

openBtn.onclick=()=>{
  cover.style.opacity=0;
  setTimeout(()=>cover.style.display="none",800);
  bgMusic.play();
};
</script>

</body>
</html>
