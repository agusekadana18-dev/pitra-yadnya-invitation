<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Pitra Yadnya</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
:root{
  --gold:#d4af37;
  --bg:#0b0b0b;
  --text:#ffffff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
  font-family:Poppins,sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* ================= COVER ================= */
#cover{
  position:relative;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
  background:radial-gradient(circle at top,#1a1a1a,#000);
}

.cover-box{
  z-index:2;
  max-width:600px;
  padding:20px;
}

.cover-box h1{
  font-family:'Playfair Display',serif;
  color:var(--gold);
  font-size:42px;
}

.cover-box h3{
  letter-spacing:2px;
  opacity:.8;
}

#openBtn{
  margin-top:25px;
  padding:14px 40px;
  border:1px solid var(--gold);
  background:transparent;
  color:var(--gold);
  cursor:pointer;
  transition:.3s;
}
#openBtn:hover{
  background:var(--gold);
  color:#000;
}

/* floating ornament */
.float span{
  position:absolute;
  color:rgba(212,175,55,.15);
  font-size:22px;
  animation:move 12s linear infinite;
}

@keyframes move{
  0%{transform:translateY(100vh);}
  100%{transform:translateY(-10vh);}
}

/* ================= MAIN ================= */
#main{
  display:none;
  max-width:1000px;
  margin:auto;
  padding:60px 20px;
}

.section{
  margin:80px 0;
  text-align:center;
}

.orn{
  font-size:26px;
  color:var(--gold);
  margin-bottom:20px;
}

/* HERO */
.hero{
  display:flex;
  gap:30px;
  flex-wrap:wrap;
  align-items:center;
}

.hero img{
  width:100%;
  max-width:400px;
  border:2px solid var(--gold);
}

.hero-text{
  flex:1;
  text-align:left;
}

.hero-text h2{
  font-family:'Playfair Display',serif;
  color:var(--gold);
}

/* COUNTDOWN */
#countdown{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.box{
  border:1px solid var(--gold);
  padding:12px 16px;
  min-width:80px;
}

.box span{
  font-size:22px;
  color:var(--gold);
}

/* MAP */
iframe{
  width:100%;
  height:300px;
  border:0;
}

/* MUSIC */
#musicBtn{
  position:fixed;
  bottom:20px;
  right:20px;
  width:50px;
  height:50px;
  border-radius:50%;
  background:var(--gold);
  border:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- COVER -->
<section id="cover">
  <div class="float">
    <span style="left:10%">ᬒᬫ᭄</span>
    <span style="left:30%">✦</span>
    <span style="left:60%">ᬒᬫ᭄</span>
    <span style="left:80%">✦</span>
  </div>

  <div class="cover-box">
    <h3>Upacara</h3>
    <h1 id="title">Pitra Yadnya</h1>
    <p id="name">—</p>
    <p id="date">—</p>

    <button id="openBtn">Buka Undangan</button>
  </div>
</section>

<!-- MAIN -->
<section id="main">

  <div class="section">
    <div class="orn">ᬒᬫ᭄</div>
    <p>Om Swastyastu</p>
    <p id="greeting"></p>
  </div>

  <div class="section hero">
    <img id="heroImg">
    <div class="hero-text">
      <h2 id="person"></h2>
      <p id="desc"></p>
    </div>
  </div>

  <div class="section">
    <h2 style="color:var(--gold)">Countdown</h2>
    <div id="countdown">
      <div class="box"><span id="d">0</span>Hari</div>
      <div class="box"><span id="h">0</span>Jam</div>
      <div class="box"><span id="m">0</span>Menit</div>
      <div class="box"><span id="s">0</span>Detik</div>
    </div>
  </div>

  <div class="section">
    <h2 style="color:var(--gold)">Lokasi</h2>
    <iframe id="maps"></iframe>
  </div>

</section>

<!-- MUSIC -->
<audio id="music" loop></audio>
<button id="musicBtn" style="display:none;">♫</button>

<script>
const cover=document.getElementById('cover');
const main=document.getElementById('main');
const openBtn=document.getElementById('openBtn');
const musicBtn=document.getElementById('musicBtn');
const music=document.getElementById('music');

let target;

fetch('event.json')
.then(r=>r.json())
.then(d=>{

  document.getElementById('name').innerText=d.event.person;
  document.getElementById('date').innerText=d.event.dateText;
  document.getElementById('heroImg').src=d.hero.image;
  document.getElementById('greeting').innerText=d.opening.greeting;
  document.getElementById('maps').src=d.location.mapsEmbed;

  target=new Date(d.event.dateISO).getTime();

  setInterval(()=>{
    let diff=target-Date.now();
    if(diff<=0)return;

    d.innerText=Math.floor(diff/86400000);
    h.innerText=Math.floor(diff/3600000)%24;
    m.innerText=Math.floor(diff/60000)%60;
    s.innerText=Math.floor(diff/1000)%60;
  },1000);

  music.src=d.music.audio;
});

openBtn.onclick=async()=>{
  cover.style.display='none';
  main.style.display='block';
  musicBtn.style.display='block';

  try{await music.play();}catch(e){}
};

musicBtn.onclick=()=>{
  music.paused?music.play():music.pause();
};
</script>

</body>
</html>
