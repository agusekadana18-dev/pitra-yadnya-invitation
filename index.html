<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pitra Yadnya</title>

<style>
:root{
  --bg:#070b12;
  --gold:#d4af37;
  --gold-soft:#f4e7a1;
}
*{margin:0;padding:0;box-sizing:border-box;font-family:"Georgia",serif;}
body{
  background:var(--bg);
  color:white;
  text-align:center;
}
section{padding:70px 20px;}
h1{color:var(--gold);font-size:40px;}
h2{color:var(--gold-soft);font-weight:normal;margin-top:10px;}
p{max-width:720px;margin:20px auto;line-height:1.8}

/* COVER */
#cover{
  position:fixed;inset:0;
  background:radial-gradient(circle,#0b1320,#000);
  display:flex;align-items:center;justify-content:center;
  z-index:999;
}
.cover-box{
  border:2px solid var(--gold);
  padding:50px 30px;
  width:320px;
}
.cover-box img{width:120px;margin:20px auto;display:block;}
.cover-box button{
  margin-top:30px;
  padding:12px 30px;
  background:linear-gradient(135deg,var(--gold),var(--gold-soft));
  border:none;font-size:16px;cursor:pointer;
}

/* HERO */
.hero img{
  width:100%;
  max-width:420px;
  border:4px solid var(--gold);
  margin:40px auto;
  display:block;
}

/* COUNTDOWN */
#countdown{display:flex;justify-content:center;gap:20px;margin-top:30px;}
.box{border:1px solid var(--gold);padding:15px;min-width:70px;}
.box span{display:block;font-size:26px;color:var(--gold);}

/* MAP */
iframe{width:100%;max-width:800px;height:320px;border:2px solid var(--gold);}

footer{padding:40px;color:#aaa;font-size:14px;}
</style>
</head>

<body>

<!-- COVER -->
<div id="cover">
  <div class="cover-box">
    <h2 id="opening"></h2>
    <img src="assets/ornament.svg">
    <button id="openBtn">Buka Undangan</button>
  </div>
</div>

<audio id="music" loop></audio>

<section class="hero">
  <h1 id="title"></h1>
  <h2 id="subtitle"></h2>
  <img id="hero">
</section>

<section>
  <p id="mantra"></p>
  <div id="countdown">
    <div class="box"><span id="d">0</span>Hari</div>
    <div class="box"><span id="h">0</span>Jam</div>
    <div class="box"><span id="m">0</span>Menit</div>
    <div class="box"><span id="s">0</span>Detik</div>
  </div>
</section>

<section>
  <h2 id="locName"></h2>
  <p id="locAddr"></p>
  <iframe id="map"></iframe>
</section>

<section>
  <p id="family"></p>
</section>

<footer id="footer"></footer>

<script>
fetch("event.json")
.then(r=>r.json())
.then(e=>{
  title.innerText=e.title;
  subtitle.innerText=e.subtitle;
  opening.innerText=e.opening;
  mantra.innerText=e.mantra;
  hero.src=e.heroImage;
  family.innerText=e.family;
  footer.innerText=e.footer;
  locName.innerText=e.locationName;
  locAddr.innerText=e.locationAddress;
  map.src=e.mapsEmbed;
  music.src=e.music;

  const target=new Date("2026-06-26T08:00:00+08:00").getTime();
  setInterval(()=>{
    const now=Date.now();
    const diff=target-now;
    d.innerText=Math.floor(diff/86400000);
    h.innerText=Math.floor(diff%86400000/3600000);
    m.innerText=Math.floor(diff%3600000/60000);
    s.innerText=Math.floor(diff%60000/1000);
  },1000);
});

openBtn.onclick=()=>{
  cover.style.display="none";
  music.play();
};
</script>

</body>
</html>
